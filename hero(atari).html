    <script>
// ARREGLOS DE CARGA Y CONTROLES
let atari = null;
let canvas = document.getElementById('nes-canvas');
let isMenuOpen = false;
let currentVolume = 0.8;

async function playLocalROM() {
    try {
        const res = await fetch('hero(atari).bin'); // Prueba primero con .bin
        if(!res.ok) throw new Error("No se encontró rom.bin, probando .txt...");
        const romBuffer = await res.arrayBuffer();
        const romBytes = new Uint8Array(romBuffer);
        startEmulator(romBytes);
    } catch(err) {
        try {
            const resTxt = await fetch('1943(atari).txt');
            if(!resTxt.ok) throw new Error("Archivo no encontrado");
            const texto = (await resTxt.text()).trim();
            let romBytes;
            if(/^[A-Za-z0-9+/=]+$/.test(texto)) {
                const binStr = atob(texto);
                romBytes = new Uint8Array(binStr.length);
                for(let i=0; i<binStr.length; i++) romBytes[i] = binStr.charCodeAt(i);
            } else {
                romBytes = new Uint8Array(texto.split('').map(c => c.charCodeAt(0)));
            }
            startEmulator(romBytes);
        } catch(err2) {
            alert("❌ ERROR: Coloca '1943.bin' o '1943(atari).txt' en la MISMA carpeta que este archivo HTML\n" + err2.message);
        }
    }
}

function loadUserROM(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    
    // Leer archivos binarios correctamente
    if(file.name.endsWith('.bin') || file.name.endsWith('.a26') || file.name.endsWith('.rom')) {
        reader.onload = ev => {
            const romBytes = new Uint8Array(ev.target.result);
            startEmulator(romBytes);
        };
        reader.readAsArrayBuffer(file);
    } 
    // Leer archivos de texto con base64
    else if(file.name.endsWith('.txt')) {
        reader.onload = ev => {
            const texto = ev.target.result.trim();
            const binStr = atob(texto);
            const romBytes = new Uint8Array(binStr.length);
            for(let i=0; i<binStr.length; i++) romBytes[i] = binStr.charCodeAt(i);
            startEmulator(romBytes);
        };
        reader.readAsText(file);
    }
}

function startEmulator(romData) {
    document.getElementById('emulator-section').classList.remove('hidden');
    try {
        // Inicializar Javatari correctamente
        atari = new Javatari({
            canvas: canvas,
            rom: romData,
            volume: currentVolume,
            autoStart: true
        });
        alert("✅ ROM cargada correctamente!");
        initTouchControls();
    } catch(err) {
        alert("❌ ROM inválida: " + err.message);
        console.error(err);
    }
}

function togglePlatformsMenu() {
    document.getElementById('platforms-dropdown').classList.toggle('hidden');
}
function toggleConfigMenu() {
    const menu = document.getElementById('config-menu');
    menu.classList.toggle('hidden');
    if(atari) menu.classList.contains('hidden') ? atari.resume() : atari.pause();
}

function initTouchControls() {
    // Asignar controles táctiles
    document.getElementById('touch-a').addEventListener('touchstart', () => atari?.fire1(true), {passive:false});
    document.getElementById('touch-a').addEventListener('touchend', () => atari?.fire1(false), {passive:false});
    document.getElementById('touch-b').addEventListener('touchstart', () => atari?.fire1(true), {passive:false});
    document.getElementById('touch-b').addEventListener('touchend', () => atari?.fire1(false), {passive:false});
    
    document.getElementById('touch-start').addEventListener('click', () => atari?.reset(), {passive:true});
    document.getElementById('touch-select').addEventListener('click', () => atari?.select(), {passive:true});
    
    // Teclas físicas
    document.addEventListener('keydown', e => {
        if(!atari) return;
        switch(e.key) {
            case 'ArrowUp': atari.up(true); break;
            case 'ArrowDown': atari.down(true); break;
            case 'ArrowLeft': atari.left(true); break;
            case 'ArrowRight': atari.right(true); break;
            case ' ': atari.fire1(true); break;
            case 'Enter': atari.reset(); break;
            case 's': atari.select(); break;
        }
        e.preventDefault();
    });
    document.addEventListener('keyup', e => {
        if(!atari) return;
        switch(e.key) {
            case 'ArrowUp': atari.up(false); break;
            case 'ArrowDown': atari.down(false); break;
            case 'ArrowLeft': atari.left(false); break;
            case 'ArrowRight': atari.right(false); break;
            case ' ': atari.fire1(false); break;
        }
    });
}

document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
    document.getElementById('close-emulator').onclick = () => location.reload();
});
    </script>
