<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas en Vivo - Salas Personalizadas</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f0f2f5; color: #333; margin: 0; padding: 20px; }
        .box { background: white; max-width: 550px; margin: 20px auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .flex-section { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        input { padding: 10px; font-size: 16px; border: 2px solid #ddd; border-radius: 6px; width: 80px; text-align: center; font-weight: bold; }
        .btn { padding: 10px 20px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .btn-green { background: #28a745; } .btn-green:hover { background: #218838; }
        .btn-blue { background: #007bff; } .btn-blue:hover { background: #0069d9; }
        canvas, video { border: 3px solid #222; background: #fff; border-radius: 8px; margin-top: 15px; }
        #status { font-weight: bold; color: #666; margin: 15px 0; padding: 8px; background: #e9ecef; border-radius: 5px; display: inline-block; }
    </style>
</head>
<body>

    <h2>Transmisión de Canvas P2P</h2>
    <div id="status">Selecciona una opción abajo para empezar</div>

    <!-- PANEL DE CONTROL PRINCIPAL -->
    <div id="panelControl" class="box">
        <div class="flex-section" style="border-bottom: 1px solid #eee; padding-bottom: 20px;">
            <h3>OPCIÓN A: Transmitir mi Canvas</h3>
            <p>Crea un ID numérico para tu sala (ej: 4567):</p>
            <div>
                <input type="number" id="idEmisor" value="1234">
                <button class="btn btn-green" onclick="iniciarTransmision()">Iniciar Transmisión</button>
            </div>
        </div>

        <div class="flex-section">
            <h3>OPCIÓN B: Ver el Canvas de otra persona</h3>
            <p>Introduce el ID de la sala a la que te quieres conectar:</p>
            <div>
                <input type="number" id="idReceptor" value="1234">
                <button class="btn btn-blue" onclick="conectarseATransmision()">Ver Transmisión</button>
            </div>
        </div>
    </div>

    <!-- ÁREA DE TRANSMISIÓN (EMISOR) -->
    <div id="zonaEmisor" class="box" style="display: none;">
        <h3>Tu Canvas (Dibuja con el mouse)</h3>
        <canvas id="miCanvas" width="500" height="380"></canvas>
    </div>

    <!-- ÁREA DE VISUALIZACIÓN (RECEPTOR) -->
    <div id="zonaReceptor" class="box" style="display: none;">
        <h3>Video en Tiempo Real</h3>
        <video id="videoCanvas" autoplay playsinline width="500" height="380"></video>
    </div>

    <script>
        let peer = null;
        const statusDiv = document.getElementById('status');

        // PREFIX de seguridad para evitar colisiones globales con otros usuarios de PeerJS
        const PREFIX = "canvas-room-xyz-";

        // ==========================================
        // 1. LÓGICA PARA EL EMISOR (EL QUE COMPARTE)
        // ==========================================
        function iniciarTransmision() {
            const salaId = document.getElementById('idEmisor').value;
            if(!salaId) return alert("Por favor ingresa un número de ID");

            statusDiv.innerText = "Configurando sala...";
            
            // Creamos el nodo Peer con el ID personalizado
            peer = new Peer(PREFIX + salaId);

            peer.on('open', (id) => {
                document.getElementById('panelControl').style.display = 'none';
                document.getElementById('zonaEmisor').style.display = 'block';
                statusDiv.innerText = `Transmitiendo en la sala: ${salaId}. Pídele a tu amigo que ingrese este número.`;
                configurarCanvas();
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    statusDiv.innerText = "Error: Ese ID de sala ya está ocupado. Intenta con otro número.";
                } else {
                    statusDiv.innerText = "Error de conexión: " + err.type;
                }
            });
        }

        function configurarCanvas() {
            const canvas = document.getElementById('miCanvas');
            const ctx = canvas.getContext('2d');
            let dibujando = false;

            ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.strokeStyle = '#007bff';

            canvas.addEventListener('mousedown', () => dibujando = true);
            canvas.addEventListener('mouseup', () => { dibujando = false; ctx.beginPath(); });
            canvas.addEventListener('mousemove', (e) => {
                if (!dibujando) return;
                const rect = canvas.getBoundingClientRect();
                ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
            });

            // Capturar flujo de video del canvas a 30 FPS
            const stream = canvas.captureStream(30);

            // Escuchar llamadas entrantes de los espectadores
            peer.on('call', (call) => {
                statusDiv.innerText = "¡Un espectador se ha conectado a tu pantalla!";
                call.answer(stream); // Responder enviando el video
            });
        }

        // ==========================================
        // 2. LÓGICA PARA EL RECEPTOR (EL QUE MIRA)
        // ==========================================
        function conectarseATransmision() {
            const salaId = document.getElementById('idReceptor').value;
            if(!salaId) return alert("Por favor ingresa el número de ID de tu amigo");

            statusDiv.innerText = "Conectando a la sala...";
            
            // Creamos un Peer con ID aleatorio para el espectador
            peer = new Peer();

            peer.on('open', () => {
                document.getElementById('panelControl').style.display = 'none';
                document.getElementById('zonaReceptor').style.display = 'block';

                // Llamamos al emisor usando el ID de su sala
                const call = peer.call(PREFIX + salaId, new MediaStream());

                call.on('stream', (remoteStream) => {
                    statusDiv.innerText = `Conectado exitosamente a la sala: ${salaId}`;
                    const video = document.getElementById('videoCanvas');
                    video.srcObject = remoteStream;
                });
            });

            peer.on('error', (err) => {
                statusDiv.innerText = "No se pudo conectar. Verifica que el ID sea correcto y que el emisor ya haya iniciado la transmisión.";
                console.error(err);
            });
        }
    </script>
</body>
</html>
