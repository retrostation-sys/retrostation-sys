<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canvas Compartido en Tiempo Real</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 15px; }
        .box { background: white; max-width: 500px; margin: 15px auto; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .flex-section { display: flex; flex-direction: column; gap: 15px; }
        input { padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 6px; width: 120px; text-align: center; font-weight: bold; }
        .btn { padding: 12px 24px; font-size: 16px; font-weight: bold; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .btn-green { background: #28a745; }
        .btn-blue { background: #007bff; }
        canvas { border: 3px solid #222; background: #fff; border-radius: 8px; margin-top: 15px; touch-action: none; max-width: 100%; height: auto; display: block; margin-left: auto; margin-right: auto; }
        #status { font-weight: bold; color: #333; margin: 10px 0; padding: 10px; background: #fff3cd; border: 1px solid #ffeeba; border-radius: 5px; display: inline-block; font-size: 14px; }
    </style>
</head>
<body>

    <h2>Lienzo Compartido Táctil (Instantáneo)</h2>
    <div id="status">Ingresa un número de sala para comenzar...</div>

    <!-- PANEL DE CONTROL -->
    <div id="panelControl" class="box">
        <div class="flex-section">
            <h3>Conectar a una Sala</h3>
            <p>Escribe cualquier número de sala (Ej: 3030) y elige tu rol:</p>
            <div>
                <input type="number" id="idSala" pattern="[0-9]*" inputmode="numeric" value="3030">
                <br><br>
                <button class="btn btn-green" onclick="conectarSala('emisor')">Transmitir Dibujo</button>
                <button class="btn btn-blue" onclick="conectarSala('receptor')">Solo Observar</button>
            </div>
        </div>
    </div>

    <!-- INTERFAZ COMPARTIDA (AMBOS USAN UN CANVAS LOCAL) -->
    <div id="zonaCanvas" class="box" style="display: none;">
        <h3 id="tituloRol">Lienzo</h3>
        <canvas id="miCanvas" width="400" height="400"></canvas>
    </div>

    <script>
        let ws = null;
        let rolUsuario = '';
        const statusDiv = document.getElementById('status');
        const canvas = document.getElementById('miCanvas');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.strokeStyle = '#007bff';

        function actualizarEstado(texto) { statusDiv.innerText = texto; }

        function conectarSala(rol) {
            const salaId = document.getElementById('idSala').value.trim();
            if (!salaId) return alert("Por favor ingresa un número de sala");

            rolUsuario = rol;
            actualizarEstado("Conectando con la sala de datos en tiempo real...");

            // Usamos la API pública de pruebas e instantánea de PieSocket (100% disponible)
            const apiKey = "oCd7EMZwOQIeeCVatZHzbAsFQA9yd9w7STwSgGZ5"; 
            const wsUrl = `wss://://piesocket.com{salaId}?api_key=${apiKey}&notify_self=0`;

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                document.getElementById('panelControl').style.display = 'none';
                document.getElementById('zonaCanvas').style.display = 'block';
                
                if (rolUsuario === 'emisor') {
                    document.getElementById('tituloRol').innerText = "Tu Lienzo (Dibuja con mouse o dedo)";
                    actualizarEstado(`Transmitiendo en vivo en la sala: ${salaId}`);
                    activarEventosDibujo();
                } else {
                    document.getElementById('tituloRol').innerText = "Pantalla del Emisor (Modo Lectura)";
                    actualizarEstado(`Sincronizado a la sala: ${salaId}. Esperando trazos...`);
                }
            };

            ws.onmessage = (event) => {
                if (rolUsuario === 'receptor') {
                    const datos = JSON.parse(event.data);
                    ejecutarDibujoRemoto(datos);
                }
            };

            ws.onerror = (e) => {
                console.error(e);
                actualizarEstado("Error de red. Intenta con otro número de sala.");
            };
        }

        // ==========================================
        // CAPTURA Y ENVÍO DE COORDENADAS (EMISOR)
        // ==========================================
        function enviarTrazo(tipo, x, y) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({ tipo, x, y }));
            }
        }

        function activarEventosDibujo() {
            function empezar(x, y) { dibujando = true; ctx.beginPath(); ctx.moveTo(x, y); enviarTrazo('start', x, y); }
            function mover(x, y) { if (!dibujando) return; ctx.lineTo(x, y); ctx.stroke(); enviarTrazo('move', x, y); }
            function parar() { dibujando = false; ctx.beginPath(); enviarTrazo('end', 0, 0); }

            // Mouse PC
            canvas.addEventListener('mousedown', (e) => { const r = canvas.getBoundingClientRect(); empezar(e.clientX - r.left, e.clientY - r.top); });
            canvas.addEventListener('mousemove', (e) => { const r = canvas.getBoundingClientRect(); mover(e.clientX - r.left, e.clientY - r.top); });
            canvas.addEventListener('mouseup', parar);

            // Táctil Móvil
            canvas.addEventListener('touchstart', (e) => {
                const r = canvas.getBoundingClientRect();
                const t = e.touches[0];
                empezar(t.clientX - r.left, t.clientY - r.top);
                e.preventDefault();
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                const r = canvas.getBoundingClientRect();
                const t = e.touches[0];
                mover(t.clientX - r.left, t.clientY - r.top);
                e.preventDefault();
            }, { passive: false });

            canvas.addEventListener('touchend', parar);
        }

        // ==========================================
        // REPLICACIÓN DE TRAZOS EN TIEMPO REAL (RECEPTOR)
        // ==========================================
        function ejecutarDibujoRemoto(datos) {
            if (datos.tipo === 'start') {
                ctx.beginPath();
                ctx.moveTo(datos.x, datos.y);
            } else if (datos.tipo === 'move') {
                ctx.lineTo(datos.x, datos.y);
                ctx.stroke();
            } else if (datos.tipo === 'end') {
                ctx.beginPath();
            }
        }
    </script>
</body>
</html>
