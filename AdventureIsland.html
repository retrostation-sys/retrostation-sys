<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emulador NES Retro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsnes@3.0.1/dist/jsnes.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
        :root { --negro: #121212; --gris: #1e1e1e; --gris-claro: #333; --azul: #2563eb; --verde: #10b981; --blanco: #f5f5f5; --trans: all 0.2s ease; }
        body { background: var(--negro); color: var(--blanco); min-height: 100vh; overflow: hidden; }
        .hidden { display: none !important; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .center { justify-content: center; align-items: center; }
        .gap-1 { gap: 0.5rem; }
        .gap-2 { gap: 1rem; }
        .p-2 { padding: 1rem; }
        .p-3 { padding: 1.5rem; }
        .rounded { border-radius: 0.75rem; }
        .bg-gris { background: var(--gris); }
        .bg-azul { background: var(--azul); }
        .bg-verde { background: var(--verde); }
        .boton { border: none; padding: 0.75rem 1rem; border-radius: 0.5rem; font-weight: 500; cursor: pointer; transition: var(--trans); color: white; font-size: 1rem; }
        .boton:hover { transform: translateY(-1px); opacity: 0.9; }
        .boton:active { transform: translateY(0); }
        .input { padding: 0.75rem; border: 1px solid var(--gris-claro); border-radius: 0.5rem; background: var(--negro); color: var(--blanco); font-size: 1rem; }

        /* MENÚ PRINCIPAL */
        #menu-principal { min-height: 100vh; padding: 2rem; }
        .titulo { font-size: 2.2rem; font-weight: 700; margin-bottom: 2rem; text-align: center; background: linear-gradient(90deg, #ef4444, #f59e0b); -webkit-background-clip: text; color: transparent; }
        .grupo-botones { width: 100%; max-width: 400px; }
        .grupo-botones .boton { width: 100%; margin-bottom: 0.8rem; }
        .caja-id { margin-top: 1.5rem; padding: 1rem; border: 1px solid var(--gris-claro); border-radius: 0.75rem; }
        .caja-id h3 { margin-bottom: 0.8rem; font-size: 1rem; }
        .fila-id { display: flex; gap: 0.5rem; align-items: center; }
        .fila-id .input { flex: 1; }
        .info-id { margin-top: 0.5rem; font-size: 0.85rem; color: #9ca3af; }

        /* EMULADOR */
        #emulator-section { position: fixed; inset: 0; background: black; }
        #canvas-nes { width: 100%; height: auto; max-height: 55vh; display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
        .barra-superior { position: absolute; top: 0; left: 0; right: 0; padding: 0.8rem; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent); z-index: 20; }
        #player-role-tag { font-size: 0.9rem; font-weight: 500; color: var(--verde); }
        .btn-cerrar { background: rgba(255,0,0,0.2); border: none; color: white; padding: 0.5rem; border-radius: 50%; cursor: pointer; }

        /* CONTROLES TÁCTILES */
        .zona-controles { position: absolute; bottom: 0; left: 0; right: 0; padding: 1rem; display: flex; justify-content: space-between; align-items: flex-end; z-index: 10; }
        .joystick-container { position: relative; width: 140px; height: 140px; }
        #touch-joystick { width: 100%; height: 100%; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; }
        #joystick-knob { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: rgba(255,255,255,0.3); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .grupo-botones-accion { display: flex; flex-direction: column; gap: 0.7rem; align-items: flex-end; }
        .fila-botones { display: flex; gap: 0.7rem; }
        .boton-accion { width: 60px; height: 60px; border-radius: 50%; background: rgba(255,255,255,0.15); border: none; color: white; font-weight: bold; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: var(--trans); }
        .boton-accion:active { background: rgba(255,255,255,0.3); transform: scale(0.95); }
        .boton-pequeño { width: 45px; height: 45px; font-size: 0.9rem; }
        .dpad-btn { align-items: center; justify-content: center; }

        /* AJUSTES */
        .menu-ajustes { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 50; padding: 2rem; display: flex; flex-direction: column; gap: 1rem; }
        .menu-ajustes h2 { text-align: center; margin-bottom: 1rem; }
        .opcion { display: flex; justify-content: space-between; align-items: center; padding: 0.7rem; border-radius: 0.5rem; background: var(--gris); }
        .switch { width: 45px; height: 24px; background: var(--gris-claro); border-radius: 12px; position: relative; cursor: pointer; }
        .switch.activo { background: var(--azul); }
        .switch::after { content: ''; position: absolute; top: 2px; left: 2px; width: 20px; height: 20px; background: white; border-radius: 50%; transition: var(--trans); }
        .switch.activo::after { transform: translateX(21px); }
    </style>
</head>
<body>

<!-- MENÚ PRINCIPAL -->
<div id="menu-principal" class="flex flex-col center">
    <h1 class="titulo">RETRO NES EMULADOR</h1>
    <div class="grupo-botones">
        <button class="boton bg-verde" onclick="playLocalROM()">🎮 Jugar Adventure Island</button>
        <button class="boton bg-azul" onclick="document.getElementById('rom-file').click()">📂 Cargar tu ROM</button>
        <input type="file" id="rom-file" accept=".nes" class="hidden" onchange="loadUserROM(event)">
        
        <div class="caja-id">
            <h3>🔗 Multijugador en línea</h3>
            <div class="fila-id">
                <input type="text" id="custom-id-input" class="input" placeholder="Tu ID personalizado">
                <button class="boton" style="padding:0.75rem 1.2rem;" onclick="crearSesion()">Usar</button>
            </div>
            <div class="fila-id" style="margin-top:0.5rem;">
                <input type="text" id="netplay-join-id" class="input" placeholder="Escribe el ID de tu amigo">
                <button class="boton" style="padding:0.75rem 1.2rem;" onclick="connectToPeer()">Conectar</button>
            </div>
            <p class="info-id">Usa letras, números, guiones y guion bajo (3 a 20 caracteres)</p>
        </div>
    </div>
</div>
<!-- SECCIÓN EMULADOR -->
<div id="emulator-section" class="hidden">
    <div class="barra-superior">
        <span id="player-role-tag">MODO LOCAL</span>
        <button class="btn-cerrar" id="close-emulator">✕</button>
    </div>
    <canvas id="canvas-nes" width="256" height="240"></canvas>

    <!-- CONTROLES TÁCTILES -->
    <div class="zona-controles">
        <div class="joystick-container">
            <div id="touch-joystick">
                <div id="joystick-knob"></div>
            </div>
        </div>

        <div class="grupo-botones-accion">
            <div class="fila-botones">
                <button class="boton-accion boton-pequeño dpad-btn" id="touch-select">SELECT</button>
                <button class="boton-accion boton-pequeño dpad-btn" id="touch-start">START</button>
            </div>
            <div class="fila-botones">
                <button class="boton-accion" id="touch-b">B</button>
                <button class="boton-accion" id="touch-a">A</button>
            </div>
        </div>
    </div>
</div>

<script>
// VARIABLES GLOBALES
let nes, ctx, imageData, framebuffer8, framebuffer24;
let audioCtx, audioSamples, audioWritePtr, audioBufferSize;
let animationFrameId;
let peer, conn, isPlayer1 = false;
let isMenuOpen = false;
let config = { vibracion: true, mantenerPantalla: true, intercambiarAB: false };

// INICIALIZACIÓN BÁSICA
const canvas = document.getElementById('canvas-nes');
ctx = canvas.getContext('2d', { alpha: false });
imageData = ctx.createImageData(256, 240);
framebuffer8 = new Uint8Array(imageData.data.buffer);
framebuffer24 = new Uint32Array(imageData.data.buffer);

// CARGAR CONFIGURACIÓN GUARDADA
function cargarConfiguracion() {
    const guardado = localStorage.getItem('configEmulador');
    if (guardado) config = { ...config, ...JSON.parse(guardado) };
    aplicarConfiguracion();
}

function guardarConfiguracion() {
    localStorage.setItem('configEmulador', JSON.stringify(config));
}

function aplicarConfiguracion() {
    // Mantener pantalla encendida
    if (config.mantenerPantalla && 'wakeLock' in navigator) {
        navigator.wakeLock.request('screen').catch(err => console.log('Bloqueo de pantalla no disponible:', err));
    }
}

// MOTOR DE AUDIO
function initAudioEngine() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioBufferSize = 4096;
    audioSamples = new Float32Array(audioBufferSize);
    audioWritePtr = 0;

    const scriptNode = audioCtx.createScriptProcessor(audioBufferSize, 1, 2);
    scriptNode.onaudioprocess = (e) => {
        const left = e.outputBuffer.getChannelData(0);
        const right = e.outputBuffer.getChannelData(1);
        for (let i = 0; i < audioBufferSize; i++) {
            const sample = audioSamples[(audioWritePtr + i) % audioBufferSize] || 0;
            left[i] = sample;
            right[i] = sample;
        }
    };
    scriptNode.connect(audioCtx.destination);
}

// RETROALIMENTACIÓN HÁPTICA
function vibrar(patron = 10) {
    if (config.vibracion && 'vibrate' in navigator) navigator.vibrate(patron);
}

// RED / MULTIJUGADOR
function initNetplay() {
    peer = null;
    conn = null;
}

function crearSesion() {
    const customId = document.getElementById('custom-id-input').value.trim();
    // VALIDACIÓN DE ID
    if (!/^[a-zA-Z0-9_-]{3,20}$/.test(customId)) {
        alert('❌ ID inválido: usa solo letras, números, guiones y guion bajo. De 3 a 20 caracteres.');
        return;
    }
    // EVITAR INSTANCIAS DUPLICADAS
    if (peer) peer.destroy();
    
    peer = new Peer(customId);
    peer.on('open', id => console.log('Sesión creada con ID:', id));
    peer.on('error', err => {
        alert('⚠️ Error con la conexión: ' + err.message);
        console.error(err);
    });
    peer.on('connection', (connection) => {
        conn = connection;
        isPlayer1 = true; 
        document.getElementById('player-role-tag').textContent = "ONLINE: JUGADOR 1";
        setupNetworkListeners();
    });
}

function connectToPeer() {
    const targetId = document.getElementById('netplay-join-id').value.trim();
    if (!targetId) {
        alert('Escribe el ID de tu amigo primero');
        return;
    }
    if (!peer) {
        peer = new Peer();
        peer.on('open', () => {
            conn = peer.connect(targetId);
            isPlayer1 = false; 
            document.getElementById('player-role-tag').textContent = "ONLINE: JUGADOR 2";
            setupNetworkListeners();
        });
        return;
    }
    conn = peer.connect(targetId);
    isPlayer1 = false; 
    document.getElementById('player-role-tag').textContent = "ONLINE: JUGADOR 2";
    setupNetworkListeners();
}

function setupNetworkListeners() {
    conn.on('open', () => {
        console.log('Conexión establecida!');
        document.getElementById('menu-principal').classList.add('hidden');
        document.getElementById('emulator-section').classList.remove('hidden');
    });
    conn.on('data', (data) => {
        if (nes) {
            if (data.type === 'press') nes.buttonDown(data.player, data.key);
            if (data.type === 'release') nes.buttonUp(data.player, data.key);
        }
    });
    conn.on('error', err => console.error('Error de red:', err));
}
// MANEJO DE ENTRADAS
function sendInput(type, key) {
    const activeRole = isPlayer1 ? 1 : 2;
    // INTERCAMBIAR BOTONES A/B SI ESTÁ ACTIVADO
    let finalKey = key;
    if (config.intercambiarAB) {
        if (key === jsnes.Controller.BUTTON_A) finalKey = jsnes.Controller.BUTTON_B;
        if (key === jsnes.Controller.BUTTON_B) finalKey = jsnes.Controller.BUTTON_A;
    }

    if (nes) {
        if (type === 'press') nes.buttonDown(activeRole, finalKey);
        else nes.buttonUp(activeRole, finalKey);
    }
    if (conn && conn.open) conn.send({ type: type, player: activeRole, key: finalKey });
    vibrar(15);
}

function bindTouchControl(elementId, jnesButtonConst) {
    const el = document.getElementById(elementId);
    if (!el) return;
    el.addEventListener('touchstart', (e) => { 
        e.preventDefault();
        sendInput('press', jnesButtonConst); 
    }, { passive: false });
    el.addEventListener('touchend', (e) => { 
        e.preventDefault();
        sendInput('release', jnesButtonConst); 
    }, { passive: false });
}

// JOYSTICK TÁCTIL
function initTouchJoystick() {
    const container = document.getElementById('touch-joystick');
    const knob = document.getElementById('joystick-knob');
    if (!container || !knob) return;

    let joystickActive = false;
    let startX = 0, startY = 0;
    let joystickTouchId = null; 
    const maxRadius = 40; 
    let activeDirections = { up: false, down: false, left: false, right: false };

    function handleJoystickMove(currentX, currentY) {
        let deltaX = currentX - startX;
        let deltaY = currentY - startY;
        let distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        if (distance > maxRadius) {
            deltaX = (deltaX / distance) * maxRadius;
            deltaY = (deltaY / distance) * maxRadius;
            distance = maxRadius;
        }
        knob.style.transform = `translate(calc(-50% + ${deltaX}px), calc(-50% + ${deltaY}px))`;
        const threshold = 15; 
        const nextDirections = { up: deltaY < -threshold, down: deltaY > threshold, left: deltaX < -threshold, right: deltaX > threshold };

        if (nextDirections.up !== activeDirections.up) { sendInput(nextDirections.up ? 'press' : 'release', jsnes.Controller.BUTTON_UP); activeDirections.up = nextDirections.up; }
        if (nextDirections.down !== activeDirections.down) { sendInput(nextDirections.down ? 'press' : 'release', jsnes.Controller.BUTTON_DOWN); activeDirections.down = nextDirections.down; }
        if (nextDirections.left !== activeDirections.left) { sendInput(nextDirections.left ? 'press' : 'release', jsnes.Controller.BUTTON_LEFT); activeDirections.left = nextDirections.left; }
        if (nextDirections.right !== activeDirections.right) { sendInput(nextDirections.right ? 'press' : 'release', jsnes.Controller.BUTTON_RIGHT); activeDirections.right = nextDirections.right; }
    }

    function resetJoystick() {
        joystickActive = false;
        joystickTouchId = null;
        knob.style.transform = 'translate(-50%, -50%)';
        if (activeDirections.up) sendInput('release', jsnes.Controller.BUTTON_UP);
        if (activeDirections.down) sendInput('release', jsnes.Controller.BUTTON_DOWN);
        if (activeDirections.left) sendInput('release', jsnes.Controller.BUTTON_LEFT);
        if (activeDirections.right) sendInput('release', jsnes.Controller.BUTTON_RIGHT);
        activeDirections = { up: false, down: false, left: false, right: false };
    }

    container.addEventListener('touchstart', (e) => {
        if (joystickActive) return; 
        joystickActive = true;
        const touch = e.changedTouches[0];
        joystickTouchId = touch.identifier; 
        const rect = container.getBoundingClientRect();
        startX = rect.left + rect.width / 2;
        startY = rect.top + rect.height / 2;
        handleJoystickMove(touch.clientX, touch.clientY);
        e.preventDefault();
    }, { passive: false });

    container.addEventListener('touchmove', (e) => {
        if (!joystickActive) return;
        const touch = Array.from(e.touches).find(t => t.identifier === joystickTouchId);
        if (touch) handleJoystickMove(touch.clientX, touch.clientY);
        e.preventDefault();
    }, { passive: false });

    container.addEventListener('touchend', (e) => {
        if (!joystickActive) return;
        const touch = Array.from(e.changedTouches).find(t => t.identifier === joystickTouchId);
        if (touch) resetJoystick();
        e.preventDefault();
    }, { passive: false });

    container.addEventListener('touchcancel', (e) => {
        if (!joystickActive) return;
        const touch = Array.from(e.changedTouches).find(t => t.identifier === joystickTouchId);
        if (touch) resetJoystick();
        e.preventDefault();
    }, { passive: false });
}

// CARGA DE ROMS
async function playLocalROM() {
    try {
        // SOPORTE PARA TODOS LOS NAVEGADORES DE PANTALLA COMPLETA
        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();

        const response = await fetch('AdventureIsland.txt');
        if (!response.ok) throw new Error("Archivo no encontrado");
        const romDataBase64 = await response.text();
        // VALIDAR BASE64
        const romData = atob(romDataBase64.trim());
        if (!romData || romData.length < 100) throw new Error("Contenido no válido");
        startEmulatorLoop(romData);
    } catch (err) {
        alert("❌ Error al cargar juego local: " + err.message + "\nAsegúrate de que el archivo AdventureIsland.txt esté en la carpeta");
        console.error(err);
    }
}

function loadUserROM(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (!file.name.endsWith('.nes')) {
        alert('Solo se permiten archivos .nes');
        return;
    }
    const elem = document.documentElement;
    if (elem.requestFullscreen) elem.requestFullscreen();
    else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();

    const reader = new FileReader();
    reader.onload = function(e) { startEmulatorLoop(e.target.result); };
    reader.readAsBinaryString(file);
}
function startEmulatorLoop(romData) {
    document.getElementById('menu-principal').classList.add('hidden');
    document.getElementById('emulator-section').classList.remove('hidden');
    initAudioEngine();
    cargarConfiguracion();

    nes = new jsnes.NES({
        onFrame: (bufferPPU) => {
            var i = 0;
            for (var y = 0; y < 240; y++) {
                for (var x = 0; x < 256; x++) {
                    framebuffer24[i] = bufferPPU[i] | 0xFF000000;
                    i++;
                }
            }
            ctx.putImageData(imageData, 0, 0);
        },
        onAudioSample: (left, right) => {
            if (!audioCtx) return;
            audioSamples[audioWritePtr] = left;
            audioWritePtr = (audioWritePtr + 1) % audioBufferSize;
        },
        sampleRate: 44100
    });

    // INICIALIZAR TODOS LOS CONTROLES
    initTouchJoystick();
    bindTouchControl('touch-a', jsnes.Controller.BUTTON_A);
    bindTouchControl('touch-b', jsnes.Controller.BUTTON_B);
    bindTouchControl('touch-select', jsnes.Controller.BUTTON_SELECT);
    bindTouchControl('touch-start', jsnes.Controller.BUTTON_START);
    bindTouchControl('dpad-u', jsnes.Controller.BUTTON_UP);
    bindTouchControl('dpad-d', jsnes.Controller.BUTTON_DOWN);
    bindTouchControl('dpad-l', jsnes.Controller.BUTTON_LEFT);
    bindTouchControl('dpad-r', jsnes.Controller.BUTTON_RIGHT);

    try {
        nes.loadROM(romData);
        const updateFrame = () => {
            if (!isMenuOpen) nes.frame();
            animationFrameId = requestAnimationFrame(updateFrame);
        };
        animationFrameId = requestAnimationFrame(updateFrame);
    } catch (err) { 
        alert("❌ ROM dañada o incompatible");
        console.error(err); 
    }
}

// INICIO GENERAL
document.addEventListener('DOMContentLoaded', () => {
    lucide.createIcons();
    initNetplay();
    
    document.getElementById('close-emulator').addEventListener('click', () => {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        if (peer) peer.destroy();
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        window.location.reload();
    });
});
</script>
</body>
</html>
