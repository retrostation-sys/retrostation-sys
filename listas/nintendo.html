k<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RETRO STATION | NINTENDO</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #007aff;
            --secondary-blue: #00d4ff;
            --accent-cyan: #00f2ff;
            --dark-bg: #020617;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --nintendo-red: #e60012;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--dark-bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            overflow: hidden;
        }

        .viewport {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at center, rgba(10, 25, 47, 0.8) 0%, rgba(2, 6, 23, 0.9) 100%);
        }

        /* Encabezado Fijo */
        .header-nintendo {
            position: sticky;
            top: 0;
            z-index: 100;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 20px 10px 20px;
            text-align: center;
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
        }

        .nintendo-logo-box {
            border: 3px solid var(--nintendo-red);
            border-radius: 100px;
            padding: 6px 25px;
            display: inline-block;
            box-shadow: 0 0 15px rgba(230, 0, 18, 0.25);
            background: rgba(230, 0, 18, 0.05);
        }

        .nintendo-logo-box h1 {
            font-size: clamp(1.4rem, 5vw, 2.2rem);
            font-weight: 800;
            letter-spacing: -1px;
            color: #ffffff;
            text-transform: uppercase;
            font-family: Arial, sans-serif;
        }

        .subtitle {
            font-size: clamp(0.55rem, 2vw, 0.75rem);
            color: var(--accent-cyan);
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* Contenedor con Scroll Optimizado */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 900px;
            padding: 10px 0;
            margin-bottom: 30px;
            list-style: none; /* Quita los puntitos de la lista */
        }

        /* Estilos automáticos para las tarjetas creadas */
        .games-grid a {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: transform 0.2s ease, border-color 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            content-visibility: auto;
            contain-intrinsic-size: 150px 220px;
        }

        .games-grid a:active {
            transform: scale(0.95);
            border-color: var(--secondary-blue);
            background: rgba(0, 122, 255, 0.05);
        }

        .games-grid img {
            width: 100%;
            aspect-ratio: 3 / 4;
            border-radius: 10px;
            background-color: rgba(255, 255, 255, 0.02);
            object-fit: cover;
            margin-bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .games-grid div {
            font-size: clamp(0.8rem, 2.8vw, 0.95rem);
            font-weight: 600;
            text-align: center;
            line-height: 1.3;
            color: #f1f5f9;
        }

        .back-btn {
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            margin-top: auto;
            padding: 12px 25px;
            border-radius: 12px;
            border: 1px solid transparent;
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .back-btn:active {
            color: #fff;
            background: var(--glass-bg);
            border-color: var(--border);
        }

        @media (max-width: 480px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="viewport">
        
        <div class="header-nintendo">
            <div class="nintendo-logo-box">
                <h1>Nintendo</h1>
            </div>
            <div class="subtitle">Selecciona un juego</div>
        </div>

        <div class="scrollable-content">

            <ul id="lista-juegos" class="games-grid">
                
                <li data-href="pagNintendo/1943.html" data-id="1d7Uzk30mg72qj3DeFz-3DooKRjcHYTGx">1943</li>
                <li data-href="pagNintendo/AdventureIsland.html" data-id="1226f-0MV49Dfvx6cAYlSbGBmLLmu452X">ADVENTURE ISLAND</li>
                <li data-href="pag/Nintendo/Contra.html" data-id="1D1Z3k9F9i5-ugJX81ZFr2bpOYywl-iLl">CONTRA</li>                
                

            </ul>

            <a href="index.html" class="back-btn">
                ◀ Volver al Menú
            </a>

        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const items = document.querySelectorAll('#lista-juegos li');
            
            items.forEach(item => {
                const href = item.getAttribute('data-href');
                const id = item.getAttribute('data-id');
                const title = item.textContent;

                // Creamos la estructura completa usando tus datos del HTML
                item.innerHTML = `
                    <a href="${href}">
                        <img src="https://drive.google.com/thumbnail?id=${id}" alt="${title}" loading="lazy">
                        <div>${title}</div>
                    </a>
                `;
            });
        });
    </script>
</body>
</html>
