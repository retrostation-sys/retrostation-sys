    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
    <script>
        let nes, canvas = document.getElementById('nes-canvas'), ctx = canvas.getContext('2d');
        let imageData = ctx.createImageData(256, 240), framebuffer24 = new Uint32Array(new ArrayBuffer(256 * 240 * 4));
        let peer = new Peer(), conn = null;

        // --- CORRECCIONES PARA VIDEO ---
        function initNetplay() {
            peer.on('open', (id) => { document.getElementById('netplay-id').textContent = "Tu ID: " + id; });
            // Recibir llamada de video
            peer.on('call', (call) => {
                const stream = canvas.captureStream(30);
                call.answer(stream);
            });
            // Conexión de datos
            peer.on('connection', (connection) => { conn = connection; setupNetworkListeners(); });
        }

        function connectToPeer() {
            const targetId = document.getElementById('netplay-join-id').value.trim();
            // Iniciar llamada de video
            const call = peer.call(targetId, canvas.captureStream(30));
            call.on('stream', (remoteStream) => {
                const video = document.getElementById('remote-video');
                video.srcObject = remoteStream;
                video.classList.remove('hidden');
            });
            conn = peer.connect(targetId);
            setupNetworkListeners();
        }

        // ... (Resto de tu lógica de emulador y controles igual) ...
        
        function startEmulatorLoop(romData) {
            document.getElementById('emulator-section').classList.remove('hidden');
            nes = new jsnes.NES({
                onFrame: (bufferPPU) => {
                    // Tu lógica de renderizado actual
                    imageData.data.set(new Uint8ClampedArray(framebuffer24.buffer));
                    ctx.putImageData(imageData, 0, 0);
                },
                // ... resto de configuraciones
            });
        }
    </script>
