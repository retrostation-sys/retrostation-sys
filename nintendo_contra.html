    <!-- Scripts Externos - ORIGINALES SIN CAMBIOS -->

    <script src="https://unpkg.com/lucide@latest"></script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>

    <style>
        /* Fuentes - EXACTAMENTE COMO LAS DEJASTE */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght=700&display=swap');
        
        /* Reset y Base - SIN MODIFICACIONES */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; background: #020617; }
        .brand-font { font-family: 'Space Grotesk', sans-serif; }
        .touch-zone { touch-action: none; -webkit-user-select: none; user-select: none; }
        
        /* Orientación - TAL CUAL TU VERSIÓN */
        @media screen and (orientation: portrait) { 
            .portrait-warning { display: flex !important; } 
            #emulator-section { display: none !important; }
        }
        
        /* Canvas y Video - OPTIMIZADO SIN CAMBIAR APARIENCIA */
        #nes-canvas, #netplay-video { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            background: #000;
            transform: translateZ(0);
            will-change: transform;
        }
        #nes-canvas { z-index: 1; image-rendering: pixelated; image-rendering: crisp-edges; }
        #netplay-video { display: none; image-rendering: auto; z-index: 2; }
        .video-smooth { image-rendering: auto !important; }
        .screen-stretch { object-fit: fill !important; }

        /* Controles Táctiles - SIN TOCAR NADA */
        .touch-btn:active { background-color: rgba(244, 63, 94, 0.4) !important; transform: scale(0.92); }
        .joystick-container { width: 128px; height: 128px; background: rgba(30, 41, 59, 0.8); border: 2px solid rgba(51, 65, 85, 0.8); border-radius: 50%; position: relative; touch-action: none; transform: translateZ(0); }
        .joystick-knob { width: 48px; height: 48px; background: rgba(225, 29, 72, 0.9); border: 2px solid #f1f5f9; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.5); pointer-events: none; transition: background-color 0.1s; }
        
        /* D-Pad - ORIGINAL SIN CAMBIOS */
        .dpad-container { width: 130px; height: 130px; position: relative; transform: translateZ(0); }
        .dpad-btn { position: absolute; background: rgba(30, 41, 59, 0.8); border: 2px solid rgba(51, 65, 85, 0.8); color: #f1f5f9; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        .dpad-btn:active { background: rgba(244, 63, 94, 0.6) !important; }
        .dpad-up { top: 0; left: 44px; width: 42px; height: 46px; border-radius: 6px 6px 0 0; border-bottom: none; }
        .dpad-down { bottom: 0; left: 44px; width: 42px; height: 46px; border-radius: 0 0 6px 6px; border-top: none; }
        .dpad-left { top: 44px; left: 0; width: 46px; height: 42px; border-radius: 6px 0 0 6px; border-right: none; }
        .dpad-right { top: 44px; right: 0; width: 46px; height: 42px; border-radius: 0 6px 6px 0; border-left: none; }
        .dpad-center { top: 44px; left: 44px; width: 42px; height: 42px; background: rgba(30, 41, 59, 0.8); }

        /* Pantalla completa - COMPATIBLE CON ANDROID SIN CAMBIOS VISUALES */
        :fullscreen, :-webkit-full-screen, :-ms-fullscreen {
            width: 100vw; height: 100vh; padding: 0; border: 0; margin: 0; overflow: hidden;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 h-screen w-screen flex flex-col md:flex-row antialiased select-none overflow-hidden">

    <!-- Advertencia Orientación - INCLUIDA PUBLICIDAD TAL CUAL LA DEJASTE -->
    <div class="portrait-warning fixed inset-0 bg-slate-950 z-[100] hidden flex-col items-center justify-between p-6 text-center" style="background-image: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9));">
        <div class="w-full bg-slate-900/60 border border-slate-800 rounded-lg p-1 text-[10px] text-slate-500">
            <span class="text-[8px] text-slate-600">Espacio Publicitario</span>
            <ins class="adsbygoogle" style="display:inline-block;width:320px;height:50px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="ZZZZZZZZZZ"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
        <div class="flex flex-col items-center my-auto">
            <div class="w-16 h-16 bg-rose-600 rounded-full flex items-center justify-center animate-bounce mb-4 shadow-lg shadow-rose-600/50">
                <i data-lucide="rotate-cw" class="w-8 h-8 text-white"></i>
            </div>
            <h2 class="brand-font text-xl font-bold text-white tracking-wider">GIRA TU DISPOSITIVO</h2>
        </div>
        <div class="w-full bg-slate-900/60 border border-slate-800 rounded-lg p-1 text-[10px] text-slate-500">
            <span class="text-[8px] text-slate-600">Espacio Publicitario</span>
            <ins class="adsbygoogle" style="display:inline-block;width:320px;height:50px" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="ZZZZZZZZZZ"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </div>

    <!-- Menú Lateral - IMAGEN DE FONDO, BOTONES Y TEXTOS SIN MODIFICAR -->
    <aside id="pantalla-seleccion" class="w-full md:w-80 bg-slate-900 border-b md:border-b-0 md:border-r border-slate-800 flex flex-col h-1/2 md:h-full z-10 p-3">
        <div class="p-2 flex items-center gap-3 border-b border-slate-800/60 bg-slate-950/40 rounded-t-xl">
            <div class="w-7 h-7 bg-rose-600 rounded-lg flex items-center justify-center shadow-lg"><i data-lucide="gamepad-2" class="w-4 h-4 text-white"></i></div>
            <div>
                <h1 class="brand-font text-xs font-black tracking-wider text-rose-500">RETRO STATION</h1>
                <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">SINGLE ARCHIVE v8.5 NETPLAY</p>
            </div>
        </div>
        <div class="flex-1 my-3 bg-slate-950 border border-slate-800 rounded-xl shadow-lg flex flex-col relative">
            <div id="main-card-content" class="relative w-full flex-1 bg-cover bg-center flex flex-col justify-between p-4" style="background-image: linear-gradient(to bottom, rgba(15, 23, 42, 0.1), rgba(15, 23, 42, 0.9)), url('https://drive.google.com/thumbnail?id=1D1Z3k9F9i5-ugJX81ZFr2bpOYywl-iLl');">
                <span class="px-2 py-0.5 rounded bg-slate-900/90 text-[9px] font-bold text-rose-400 border border-slate-800 uppercase self-start">NINTENDO NES</span>
                <h2 class="brand-font text-base font-black tracking-wider text-white uppercase mt-4">CONTRA.</h2>
            </div>
            <!-- Menú plataformas oculto - SIN CAMBIOS -->
            <div id="platforms-dropdown" class="hidden absolute inset-0 bg-slate-950/95 p-4 z-20 flex flex-col gap-2">
                <div class="flex items-center justify-between border-b border-slate-800 pb-2 mb-1">
                    <span class="text-[10px] font-extrabold tracking-widest uppercase text-emerald-400">PLATAFORMA</span>
                    <button onclick="togglePlatformsMenu()" class="text-slate-400 hover:text-rose-500" aria-label="Cerrar menú"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
            </div>
            <div class="p-3 bg-slate-900 border-t border-slate-800/60 flex flex-col gap-2">
                <div class="flex gap-2 w-full">
                    <button onclick="playLocalROM()" class="w-2/3 py-2.5 bg-emerald-600 hover:bg-emerald-500 text-white text-[11px] font-black uppercase rounded-md border border-emerald-500 shadow-md transform active:scale-95">PLAY JUEGO</button>
                    <button onclick="connectToPeerMenu()" class="w-1/3 py-2.5 bg-sky-600 hover:bg-sky-500 text-white text-[11px] font-black uppercase rounded-md border border-sky-500 shadow-md transform active:scale-95">UNIRSE</button>
                </div>
                <input type="file" id="rom-file-input" accept=".nes" class="hidden" onchange="loadUserROM(event)" aria-label="Cargar archivo ROM">
                <div class="grid grid-cols-2 text-center pt-1">
                    <span onclick="togglePlatformsMenu()" class="text-[10px] font-bold uppercase text-slate-400 hover:text-emerald-400 cursor-pointer">Plataformas</span>
                    <span onclick="document.getElementById('rom-file-input').click()" class="text-[10px] font-bold uppercase text-slate-400 hover:text-emerald-400 cursor-pointer">Cargar ROM</span>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Emulator Area - TAL CUAL LO DEJASTE -->
    <main class="flex-1 flex flex-col h-1/2 md:h-full relative bg-slate-950">
        <section id="emulator-section" class="hidden fixed inset-0 bg-black z-[99] flex flex-col w-screen h-screen touch-zone">
            <!-- Interfaz Emulador - SIN MODIFICACIONES -->
            <div id="video-wrapper" class="absolute inset-0 w-full h-full">
                <canvas id="nes-canvas" width="256" height="240"></canvas>
                <video id="netplay-video" autoplay playsinline muted disablePictureInPicture></video>
                <div id="video-play-overlay" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,.55); align-items:center; justify-content:center; z-index:20;">
                    <div style="font-size:54px; color:white;">▶</div>
                </div>
            </div>
        </section>
    </main>
    <!-- Scripts - LÓGICA DE TRANSMISIÓN INTEGRADA SIN TOCAR TU INTERFAZ -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsnes/1.2.1/jsnes.min.js"></script>
    <script>
        /* ==============================================
           VARIABLES - ORIGINALES + MEJORAS DE STREAM
           ============================================== */
        let nes, canvas = document.getElementById('nes-canvas'), video = document.getElementById('netplay-video');
        let ctx = canvas.getContext('2d', { alpha: false });
        let imageData = ctx.createImageData(256, 240);
        let framebuffer24 = new Uint32Array(new ArrayBuffer(imageData.data.length));
        let framebuffer8 = new Uint8ClampedArray(framebuffer24.buffer);
        let animationFrameId, audioCtx, audioGain, audioStreamDest;
        let audioSamples = new Float32Array(4096), audioWritePtr = 0, currentVolume = 0.8;
        let peer, conn, activeCall, isPlayerHost = true, isMenuOpen = false, hostMediaStream;
        const ROM_URL = 'nintendo_contra_b64.txt';

        /* ==============================================
           FUNCIONES PÚBLICAS OBLIGATORIAS
           ============================================== */
        function togglePlatformsMenu() {
            document.getElementById('platforms-dropdown').classList.toggle('hidden');
        }

        /* ==============================================
           SISTEMA DE TRANSMISIÓN ESTABLE DEL CANVAS
           ============================================== */
        function prepararStreamHost() {
            if (hostMediaStream) return;
            
            // Captura video del canvas a 30fps estable (adaptado del segundo archivo)
            const videoTrack = canvas.captureStream(30).getVideoTracks()[0];
            
            // Combina video + audio en un solo flujo para transmisión
            hostMediaStream = new MediaStream();
            hostMediaStream.addTrack(videoTrack);
            
            // Agrega audio del emulador al stream si está listo
            if (audioStreamDest) {
                audioStreamDest.stream.getAudioTracks().forEach(t => hostMediaStream.addTrack(t));
            }
        }

        function sincronizarPistaVideo() {
            if (!activeCall?.peerConnection || !hostMediaStream) return;
            const nuevoTrack = canvas.captureStream(30).getVideoTracks()[0];
            const emisor = activeCall.peerConnection.getSenders().find(s => s.track?.kind === 'video');
            
            if (emisor) emisor.replaceTrack(nuevoTrack);
            else hostMediaStream.addTrack(nuevoTrack);
        }

        /* ==============================================
           INICIALIZACIÓN DE RED PEERJS
           ============================================== */
        function initNetplay() {
            // Mantiene el canvas activo para evitar errores de stream vacío
            const mantenerCanvasActivo = () => {
                if (nes) return;
                ctx.fillStyle = '#020617';
                ctx.fillRect(0, 0, 1, 1);
                requestAnimationFrame(mantenerCanvasActivo);
            };
            mantenerCanvasActivo();

            // Carga o genera ID único de consola
            let savedId = localStorage.getItem('retro_station_netplay_id');
            if (!savedId) {
                savedId = prompt("Ingresa un ID único para tu consola:");
                savedId = savedId ? savedId.replace(/[^a-zA-Z0-9-_]/g, '') : `retro-${Math.random().toString(36).slice(2, 8)}`;
                localStorage.setItem('retro_station_netplay_id', savedId);
            }

            peer = new Peer(savedId);
            
            peer.on('open', (id) => { console.log('Sesión iniciada con ID:', id); });
            
            // Recibe conexión del Jugador 2 y configura canal de datos
            peer.on('connection', (c) => { 
                conn = c; 
                isPlayerHost = true; 
                configurarCanalDatos(); 
            });
            
            // Responde llamadas de video con el stream combinado
            peer.on('call', (call) => {
                activeCall = call;
                prepararStreamHost();
                call.answer(hostMediaStream);
            });
            
            peer.on('error', (err) => {
                console.error('Error de red:', err);
                if (err.type === 'unavailable-id') {
                    alert('El ID ya está en uso. Se generará uno nuevo.');
                    localStorage.removeItem('retro_station_netplay_id');
                    window.location.reload();
                }
            });
        }

        function configurarCanalDatos() {
            conn.on('open', () => console.log('✅ Jugador 2 conectado correctamente'));
            conn.on('data', (datos) => {
                // Recibe controles del Jugador 2 y los envía al segundo mando del emulador
                if (isPlayerHost && nes) {
                    datos.type === 'press' 
                        ? nes.buttonDown(2, datos.key) 
                        : nes.buttonUp(2, datos.key);
                }
            });
            conn.on('close', () => console.log('🔴 Jugador 2 se desconectó'));
        }

        /* ==============================================
           UNIRSE A PARTIDA EXISTENTE
           ============================================== */
        function connectToPeerMenu() {
            const hostId = prompt("Ingresa el ID de la consola del Jugador 1:");
            if (!hostId) return;

            isPlayerHost = false;
            document.getElementById('emulator-section').classList.remove('hidden');
            canvas.classList.add('hidden');
            video.classList.remove('hidden');

            // Pantalla completa automática
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();

            // Conectar canal de datos y solicitar video
            conn = peer.connect(hostId);
            configurarCanalDatos();

            const llamada = peer.call(hostId, new MediaStream());
            activeCall = llamada;

            llamada.on('stream', (streamRemoto) => {
                video.srcObject = streamRemoto;
                video.play().catch(e => console.warn('Reproducción bloqueada por el navegador:', e));
            });
        }

        /* ==============================================
           SISTEMA DE AUDIO COMPATIBLE CON TRANSMISIÓN
           ============================================== */
        function initAudioEngine() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
            audioGain = audioCtx.createGain();
            audioGain.gain.setValueAtTime(currentVolume, audioCtx.currentTime);
            
            const procesador = audioCtx.createScriptProcessor(2048, 0, 1);
            procesador.onaudioprocess = (e) => {
                const salida = e.outputBuffer.getChannelData(0);
                for (let i = 0; i < salida.length; i++) {
                    salida[i] = audioSamples[audioWritePtr];
                    audioWritePtr = (audioWritePtr + 1) % 4096;
                }
            };
            
            procesador.connect(audioGain);
            audioGain.connect(audioCtx.destination);

            // Destino exclusivo para enviar audio por WebRTC
            if (audioCtx.createMediaStreamDestination) {
                audioStreamDest = audioCtx.createMediaStreamDestination();
                procesador.connect(audioStreamDest);
            }

            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        /* ==============================================
           EMULADOR NES
           ============================================== */
        function startEmulatorLoop(romData) {
            isPlayerHost = true;
            document.getElementById('emulator-section').classList.remove('hidden');
            video.classList.add('hidden');
            canvas.classList.remove('hidden');
            initAudioEngine();
            prepararStreamHost();

            nes = new jsnes.NES({
                onFrame: (bufferPPU) => {
                    for (let i = 0; i < 61440; i++) {
                        framebuffer24[i] = bufferPPU[i] | 0xFF000000;
                    }
                    imageData.data.set(framebuffer8);
                    ctx.putImageData(imageData, 0, 0);
                },
                onAudioSample: (l, r) => { 
                    audioSamples[audioWritePtr] = l; 
                    audioWritePtr = (audioWritePtr + 1) % 4096; 
                },
                sampleRate: 44100
            });

            nes.loadROM(romData);

            // Sincroniza video si hay conexión activa
            if (activeCall) sincronizarPistaVideo();

            const loop = () => { 
                if (!isMenuOpen && nes) nes.frame(); 
                animationFrameId = requestAnimationFrame(loop); 
            };
            animationFrameId = requestAnimationFrame(loop);
        }

        /* ==============================================
           CARGA DE ARCHIVOS ROM
           ============================================== */
        function playLocalROM() {
            fetch(ROM_URL)
                .then(res => {
                    if (!res.ok) throw new Error('Archivo no encontrado');
                    return res.text();
                })
                .then(b64 => {
                    const limpio = b64.trim().includes(',') ? b64.split(',')[1] : b64.trim();
                    if (limpio.length < 100) throw new Error('Datos de ROM inválidos');
                    startEmulatorLoop(atob(limpio));
                })
                .catch(err => {
                    console.error(err);
                    alert('No se pudo cargar la ROM. Verifica que el archivo "nintendo_contra_b64.txt" esté en la misma carpeta.');
                });
        }

        function loadUserROM(event) {
            const archivo = event.target.files[0];
            if (!archivo) return;
            const lector = new FileReader();
            lector.onload = (e) => startEmulatorLoop(e.target.result);
            lector.readAsBinaryString(archivo);
        }

        /* ==============================================
           INICIO GENERAL AL CARGAR LA PÁGINA
           ============================================== */
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            initNetplay();

            // Desbloquea audio al primer toque (obligatorio en Android)
            const desbloquearAudio = () => {
                if (audioCtx?.state === 'suspended') audioCtx.resume();
                document.removeEventListener('touchstart', desbloquearAudio);
                document.removeEventListener('click', desbloquearAudio);
            };
            document.addEventListener('touchstart', desbloquearAudio);
            document.addEventListener('click', desbloquearAudio);
        });
    </script>
</body>
